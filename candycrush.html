<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Crush Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka One', cursive;
            touch-action: none;
            background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
        }

        #game-container {
            position: relative;
        }
        
        #game-board.hammer-active {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-hammer"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>') 16 16, auto;
        }

        .grid-container {
            display: grid;
            touch-action: none;
            user-select: none;
            overflow: hidden;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(255,255,255,0.1) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.1) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.1) 75%);
            background-size: 2em 2em;
        }

        .candy {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            transition: transform 0.2s ease, opacity 0.3s ease;
            position: relative;
        }
        
        .candy.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        
        .candy svg {
            width: 75%;
            height: 75%;
            filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.2));
            transition: transform 0.2s ease;
            pointer-events: none;
        }
        
        .candy:hover svg {
            transform: scale(1.1);
        }

        .selected {
            animation: pulse 0.7s infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: scale(1.0); }
            to { transform: scale(1.1); }
        }
        
        .match-animation {
            animation: pop 0.5s forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .new-candy-animation {
            animation: fall 0.5s ease-out forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-200px) scale(0.5); opacity: 0;}
            80% { transform: translateY(10px) scale(1.1); opacity: 1;}
            100% { transform: translateY(0) scale(1); opacity: 1;}
        }

        .combo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: white;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            text-shadow: 3px 3px 0px #e85a9b, 6px 6px 0px rgba(0,0,0,0.2);
            animation: combo-fade 1.5s ease-out forwards;
        }

        @keyframes combo-fade {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100%) scale(0.8); opacity: 0; }
        }
        
        .striped-h-overlay, .striped-v-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient( 0deg, rgba(255,255,255,0.4), rgba(255,255,255,0.4) 10%, transparent 10%, transparent 20% );
            pointer-events: none;
        }

        .striped-v-overlay {
            background: repeating-linear-gradient( 90deg, rgba(255,255,255,0.4), rgba(255,255,255,0.4) 10%, transparent 10%, transparent 20% );
        }
        
        .wrapped-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 20%, white 5%, transparent 6%),
                radial-gradient(circle at 80% 20%, white 5%, transparent 6%),
                radial-gradient(circle at 20% 80%, white 5%, transparent 6%),
                radial-gradient(circle at 80% 80%, white 5%, transparent 6%);
             background-size: 100% 100%;
             opacity: 0.6;
             pointer-events: none;
        }

    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="game-container" class="bg-white/60 backdrop-blur-lg rounded-3xl shadow-2xl p-6 md:p-8 w-full max-w-md lg:max-w-lg border-2 border-white/50">
        <div class="text-center mb-6">
            <h1 class="text-5xl font-bold text-white tracking-wider" style="text-shadow: 2px 2px 0px #fda085, 4px 4px 0px rgba(0,0,0,0.1);">Sweet Swap</h1>
            <div class="mt-4 bg-white/70 rounded-xl p-3 flex justify-around items-center text-orange-800 shadow-inner">
                 <div>
                    <span class="text-lg text-orange-500 font-semibold">Score</span>
                    <p id="score" class="text-3xl font-bold">0</p>
                </div>
                <div>
                    <span class="text-lg text-orange-500 font-semibold">Moves</span>
                    <p id="moves" class="text-3xl font-bold">30</p>
                </div>
                 <div class="text-center">
                    <span class="text-lg text-orange-500 font-semibold">Boosters</span>
                     <button id="hammer-booster" class="bg-orange-400 rounded-full p-2 shadow-md hover:bg-orange-500 transition-colors disabled:bg-gray-400 disabled:opacity-50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                        <span id="hammer-count" class="absolute -top-1 -right-1 bg-pink-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">2</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="game-board" class="bg-orange-300/50 rounded-2xl p-2 aspect-square grid-container shadow-lg">
            <!-- Candies will be generated here by JavaScript -->
        </div>
    </div>
    
    <!-- Game Over Modal -->
    <div id="game-over-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4">
        <div class="bg-gradient-to-br from-yellow-300 to-orange-400 rounded-2xl p-8 text-center shadow-2xl transform scale-95 transition-transform duration-300 border-4 border-white">
            <h2 class="text-5xl font-bold text-white mb-4" style="text-shadow: 2px 2px 2px rgba(0,0,0,0.3)">Game Over!</h2>
            <p class="text-xl text-white/90 mb-2">Your final score is:</p>
            <p id="final-score" class="text-6xl font-extrabold text-white mb-6" style="text-shadow: 3px 3px 3px rgba(0,0,0,0.3)">0</p>
            <button id="restart-button" class="bg-gradient-to-br from-pink-500 to-orange-500 text-white font-bold py-3 px-8 rounded-full text-xl hover:from-pink-600 hover:to-orange-600 transition-all duration-300 transform hover:scale-110 shadow-lg">Play Again</button>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gameContainer = document.getElementById('game-container');
            const gameBoard = document.getElementById('game-board');
            const scoreElement = document.getElementById('score');
            const movesElement = document.getElementById('moves');
            const gameOverModal = document.getElementById('game-over-modal');
            const finalScoreElement = document.getElementById('final-score');
            const restartButton = document.getElementById('restart-button');
            const hammerBoosterBtn = document.getElementById('hammer-booster');
            const hammerCountEl = document.getElementById('hammer-count');
            
            const gridSize = 8;
            const candies = [
                // 0: Red
                `<svg viewBox="0 0 100 100"><defs><radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:0.5" /><stop offset="100%" style="stop-color:rgb(255,100,100);stop-opacity:1" /></defs><circle cx="50" cy="50" r="45" fill="#E1306C" /><circle cx="50" cy="50" r="45" fill="url(#grad1)" /><path d="M 30 30 C 40 20, 60 20, 70 30" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/></svg>`,
                // 1: Orange
                `<svg viewBox="0 0 100 100"><defs><radialGradient id="grad2" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:0.5" /><stop offset="100%" style="stop-color:rgb(255,200,100);stop-opacity:1" /></defs><rect x="10" y="25" width="80" height="50" rx="25" fill="#F77737" /><rect x="10" y="25" width="80" height="50" rx="25" fill="url(#grad2)" /><path d="M 25 50 C 30 40, 40 40, 45 50" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/><path d="M 55 50 C 60 60, 70 60, 75 50" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/></svg>`,
                // 2: Yellow
                `<svg viewBox="0 0 100 100"><defs><radialGradient id="grad3" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:0.6" /><stop offset="100%" style="stop-color:rgb(255,255,150);stop-opacity:1" /></defs><polygon points="50,5 61,35 95,35 67,55 78,85 50,65 22,85 33,55 5,35 39,35" fill="#FFC107"/><polygon points="50,5 61,35 95,35 67,55 78,85 50,65 22,85 33,55 5,35 39,35" fill="url(#grad3)"/></svg>`,
                // 3: Green
                `<svg viewBox="0 0 100 100"><defs><radialGradient id="grad4" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:0.5" /><stop offset="100%" style="stop-color:rgb(150,255,150);stop-opacity:1" /></defs><rect x="15" y="15" width="70" height="70" rx="15" fill="#4CAF50"/><rect x="15" y="15" width="70" height="70" rx="15" fill="url(#grad4)"/><circle cx="50" cy="50" r="10" fill="white" opacity="0.7"/></svg>`,
                // 4: Blue
                `<svg viewBox="0 0 100 100"><defs><radialGradient id="grad5" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:0.5" /><stop offset="100%" style="stop-color:rgb(100,100,255);stop-opacity:1" /></defs><path d="M50 10 C 20 10, 20 60, 50 90 C 80 60, 80 10, 50 10 Z" fill="#2196F3"/><path d="M50 10 C 20 10, 20 60, 50 90 C 80 60, 80 10, 50 10 Z" fill="url(#grad5)"/><path d="M 40 40 C 45 30, 55 30, 60 40" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/></svg>`,
                // 5: Purple
                `<svg viewBox="0 0 100 100"><defs><radialGradient id="grad6" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:0.5" /><stop offset="100%" style="stop-color:rgb(200,100,255);stop-opacity:1" /></defs><polygon points="50,15 85,85 15,85" fill="#9C27B0"/><polygon points="50,15 85,85 15,85" fill="url(#grad6)"/><path d="M50 40 L 50 70" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/></svg>`
            ];
            const colorBombSVG = `<svg viewBox="0 0 100 100"><defs><radialGradient id="grad_bomb" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"><stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:1" /><stop offset="100%" style="stop-color:rgb(0,0,0);stop-opacity:1" /></defs><circle cx="50" cy="50" r="40" fill="#4a2c2a"/><circle cx="50" cy="50" r="38" fill="url(#grad_bomb)"/><circle cx="35" cy="35" r="3" fill="#ff69b4"/><circle cx="65" cy="35" r="3" fill="#87ceeb"/><circle cx="35" cy="65" r="3" fill="#98fb98"/><circle cx="65" cy="65" r="3" fill="#ffd700"/><circle cx="50" cy="45" r="3" fill="#ffa07a"/><circle cx="50" cy="25" r="3" fill="#add8e6"/><circle cx="25" cy="50" r="3" fill="#dda0dd"/><circle cx="75" cy="50" r="3" fill="#f0e68c"/></svg>`;

            // --- Sound Synthesis ---
            const matchSynth = new Tone.PluckSynth({ volume: -10 }).toDestination();
            const swapSynth = new Tone.Synth({ oscillator: { type: 'triangle' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 0.1 }, volume: -15 }).toDestination();
            const specialSynth = new Tone.NoiseSynth({ noise: { type: 'pink' }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.2 }, volume: -5 }).toDestination();
            const bombSynth = new Tone.MembraneSynth({ pitchDecay: 0.2, octaves: 6, volume: -2 }).toDestination();
            const gameOverSynth = new Tone.MembraneSynth({ pitchDecay: 0.1, octaves: 4, volume: -5 }).toDestination();

            let audioStarted = false;

            let board = [];
            let score = 0;
            let movesLeft = 30;
            let hammerCount = 2;
            let isBoardLocked = false;
            let isHammerActive = false;
            let candyBeingDragged = null;
            let candyBeingReplaced = null;
            let cascadeCount = 0;

            // --- Game Initialization ---
            function initGame() {
                score = 0;
                movesLeft = 30;
                hammerCount = 2;
                isBoardLocked = false;
                isHammerActive = false;
                gameBoard.classList.remove('hammer-active');
                updateScoreAndMoves();
                gameBoard.innerHTML = '';
                gameBoard.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
                gameBoard.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;
                board = [];
                
                for (let i = 0; i < gridSize * gridSize; i++) {
                    const candyElement = createCandy(i);
                    gameBoard.appendChild(candyElement);
                    board.push(candyElement);
                }
                
                while(checkForInitialMatches()) {
                    fillBoard();
                }

                gameOverModal.classList.add('hidden');
            }
            
            function fillBoard() {
                for (let i = 0; i < gridSize * gridSize; i++) {
                    const candyType = Math.floor(Math.random() * candies.length);
                    board[i].dataset.candyType = candyType;
                    board[i].dataset.special = 'none';
                    board[i].innerHTML = candies[candyType];
                    updateOverlays(board[i]);
                }
            }
            
            function createCandy(index) {
                const candyElement = document.createElement('div');
                candyElement.classList.add('candy');
                candyElement.dataset.id = index;
                candyElement.setAttribute('draggable', true);
                
                const candyType = Math.floor(Math.random() * candies.length);
                candyElement.dataset.candyType = candyType;
                candyElement.dataset.special = 'none';
                candyElement.innerHTML = candies[candyType];
                
                candyElement.addEventListener('dragstart', dragStart);
                candyElement.addEventListener('dragover', (e) => e.preventDefault());
                candyElement.addEventListener('drop', dragDrop);
                candyElement.addEventListener('dragend', dragEnd);
                candyElement.addEventListener('click', onCandyClick);

                return candyElement;
            }
            
            function checkForInitialMatches() {
                for (let i = 0; i < gridSize * gridSize; i++) {
                    if (i % gridSize < gridSize - 2 && board[i].dataset.candyType === board[i+1].dataset.candyType && board[i].dataset.candyType === board[i+2].dataset.candyType) return true;
                    if (i < gridSize * (gridSize - 2) && board[i].dataset.candyType === board[i+gridSize].dataset.candyType && board[i].dataset.candyType === board[i+gridSize*2].dataset.candyType) return true;
                }
                return false;
            }
            
            // --- Player Actions ---
            async function onCandyClick() {
                if(isBoardLocked) return;
                if (!audioStarted) { await Tone.start(); audioStarted = true; }

                if (isHammerActive) {
                    const index = parseInt(this.dataset.id);
                    bombSynth.triggerAttackRelease("C3", "8n");
                    await handleMatches([index]); 
                    isHammerActive = false;
                    gameBoard.classList.remove('hammer-active');
                }
            }
            
            async function dragStart() {
                if(isBoardLocked || isHammerActive) return;
                if (!audioStarted) { await Tone.start(); audioStarted = true; }
                candyBeingDragged = this;
            }

            async function dragDrop() {
                if(isBoardLocked || isHammerActive) return;
                candyBeingReplaced = this;
                const candy1 = candyBeingDragged;
                const candy2 = candyBeingReplaced;
                const id1 = parseInt(candy1.dataset.id);
                const id2 = parseInt(candy2.dataset.id);

                const isAdjacent = Math.abs(id1-id2) === 1 || Math.abs(id1-id2) === gridSize;
                if (!isAdjacent) return;

                isBoardLocked = true;
                
                // Special case: Color bomb is involved
                if (candy1.dataset.special === 'color-bomb' || candy2.dataset.special === 'color-bomb') {
                    decrementMoves();
                    await handleColorBombSwap(candy1, candy2);
                    return;
                }

                swapCandies(candy1, candy2);
                
                const matches = findMatches();
                if (matches.length === 0) {
                    await new Promise(resolve => setTimeout(resolve, 300));
                    swapCandies(candy1, candy2); // Swap back
                    isBoardLocked = false;
                } else {
                    swapSynth.triggerAttackRelease("G5", "32n");
                    decrementMoves();
                    await handleMatches(matches);
                }
            }

            function dragEnd() {
                candyBeingDragged = null;
                candyBeingReplaced = null;
            }

            // --- Game Logic ---
            function swapCandies(candy1, candy2) {
                const tempHTML = candy1.innerHTML;
                const tempType = candy1.dataset.candyType;
                const tempSpecial = candy1.dataset.special;

                candy1.innerHTML = candy2.innerHTML;
                candy1.dataset.candyType = candy2.dataset.candyType;
                candy1.dataset.special = candy2.dataset.special;
                updateOverlays(candy1);

                candy2.innerHTML = tempHTML;
                candy2.dataset.candyType = tempType;
                candy2.dataset.special = tempSpecial;
                updateOverlays(candy2);
            }
            
            async function handleMatches(initialMatches) {
                let matchesToProcess = new Set(initialMatches);
                cascadeCount = 0;

                while(matchesToProcess.size > 0) {
                    cascadeCount++;
                    score += matchesToProcess.size * 10 * cascadeCount;
                    if(cascadeCount > 1) showComboText(cascadeCount);
                    
                    let soundDelay = 0;
                    matchesToProcess.forEach(index => {
                        matchSynth.triggerAttack("C5", Tone.now() + soundDelay);
                        soundDelay += 0.05;
                    });

                    let specialCandiesToCreate = findSpecialCandyOpportunities(Array.from(matchesToProcess));
                    
                    await animateAndRemoveMatches(Array.from(matchesToProcess));
                    createSpecialCandies(specialCandiesToCreate);
                    await refillBoard();

                    matchesToProcess = new Set(findMatches());
                }
                isBoardLocked = false;
            }
            
            async function handleColorBombSwap(candy1, candy2) {
                const bomb = candy1.dataset.special === 'color-bomb' ? candy1 : candy2;
                const target = candy1.dataset.special === 'color-bomb' ? candy2 : candy1;
                let matches = [parseInt(bomb.dataset.id)];
                
                specialSynth.triggerAttackRelease("C6", "2n");

                if (target.dataset.special === 'color-bomb') { // Bomb + Bomb
                    for(let i=0; i<board.length; i++) matches.push(i);
                } else { // Bomb + regular candy
                    const targetColor = target.dataset.candyType;
                    board.forEach(candy => {
                        if(candy.dataset.candyType === targetColor) {
                            matches.push(parseInt(candy.dataset.id));
                        }
                    });
                }
                await handleMatches(matches);
            }

            function findMatches() {
                let matches = new Set();
                let specialActivations = new Set();

                // Standard horizontal and vertical checks
                for (let i = 0; i < gridSize * gridSize; i++) {
                    const candy = board[i];
                    if (!candy.dataset.candyType) continue;

                    if (i % gridSize < gridSize - 2) {
                        let line = [i, i+1, i+2];
                        if (line.every(idx => board[idx].dataset.candyType === candy.dataset.candyType)) line.forEach(idx => matches.add(idx));
                    }
                    if (i < gridSize * (gridSize - 2)) {
                        let line = [i, i + gridSize, i + gridSize * 2];
                        if (line.every(idx => board[idx].dataset.candyType === candy.dataset.candyType)) line.forEach(idx => matches.add(idx));
                    }
                }
                
                let currentMatches = Array.from(matches);
                // Recursively check for special activations
                while(true) {
                    let newActivations = new Set();
                    currentMatches.forEach(index => {
                        const specialType = board[index].dataset.special;
                        if(specialType !== 'none') specialActivations.add(index);
                    });
                    if (specialActivations.size === 0) break;
                    
                    specialActivations.forEach(index => {
                        const candy = board[index];
                        const row = Math.floor(index / gridSize);
                        const col = index % gridSize;
                        if (candy.dataset.special === 'striped-h') for(let i = 0; i < gridSize; i++) newActivations.add(row * gridSize + i);
                        if (candy.dataset.special === 'striped-v') for(let i = 0; i < gridSize; i++) newActivations.add(i * gridSize + col);
                        if (candy.dataset.special === 'wrapped') {
                            bombSynth.triggerAttackRelease("G2", "8n");
                            for(let r = -1; r <= 1; r++) for(let c = -1; c <= 1; c++) {
                                if(row+r >= 0 && row+r < gridSize && col+c >= 0 && col+c < gridSize) newActivations.add((row+r) * gridSize + (col+c));
                            }
                        }
                    });

                    let beforeSize = matches.size;
                    newActivations.forEach(i => matches.add(i));
                    if (matches.size === beforeSize) break; // No new candies added, stable state
                    currentMatches = Array.from(newActivations);
                    specialActivations.clear();
                }

                return Array.from(matches);
            }

             function findSpecialCandyOpportunities(matches) {
                let opportunities = [];
                let checked = new Set();
                const candyTypeGroups = {};

                // Group matches by their color type first, as explosions can match different colors at once.
                matches.forEach(index => {
                    const candyType = board[index].dataset.candyType;
                    if (candyType) {
                        if (!candyTypeGroups[candyType]) candyTypeGroups[candyType] = [];
                        candyTypeGroups[candyType].push(index);
                    }
                });

                // Iterate over each group of same-colored candies to find special opportunities.
                for (const candyType in candyTypeGroups) {
                    const group = candyTypeGroups[candyType].sort((a, b) => a - b);
                    
                    group.forEach(index => {
                        if (checked.has(index)) return;

                        // Find all contiguous horizontal candies in this group
                        const hMatch = [index];
                        for (let i = index + 1; group.includes(i) && i % gridSize !== 0; i++) hMatch.push(i);
                        for (let i = index - 1; group.includes(i) && (i + 1) % gridSize !== 0; i--) hMatch.unshift(i);

                        // Find all contiguous vertical candies in this group
                        const vMatch = [index];
                        for (let i = index + gridSize; group.includes(i); i += gridSize) vMatch.push(i);
                        for (let i = index - gridSize; group.includes(i); i -= gridSize) vMatch.unshift(i);
                        
                        // Check for 5 in a row -> Color Bomb
                        if (hMatch.length >= 5) {
                            opportunities.push({ index: hMatch[Math.floor(hMatch.length / 2)], type: 'color-bomb' });
                            hMatch.forEach(i => checked.add(i)); return;
                        }
                        if (vMatch.length >= 5) {
                            opportunities.push({ index, type: 'color-bomb' });
                            vMatch.forEach(i => checked.add(i)); return;
                        }

                        // Check for L or T shape (3+ horizontal and 3+ vertical) -> Wrapped Candy
                        if (hMatch.length >= 3 && vMatch.length >= 3) {
                            opportunities.push({ index, type: 'wrapped' });
                            hMatch.forEach(i => checked.add(i));
                            vMatch.forEach(i => checked.add(i)); return;
                        }

                        // Check for 4 in a row -> Striped Candy
                        if (hMatch.length >= 4) {
                            opportunities.push({ index: hMatch[Math.floor(hMatch.length / 2)], type: 'striped-h' });
                            hMatch.forEach(i => checked.add(i)); return;
                        }
                        if (vMatch.length >= 4) {
                            opportunities.push({ index, type: 'striped-v' });
                            vMatch.forEach(i => checked.add(i)); return;
                        }
                    });
                }
                return opportunities;
            }

            function createSpecialCandies(opportunities) {
                opportunities.forEach(op => {
                    const candy = board[op.index];
                    if (op.type === 'color-bomb') {
                        candy.dataset.special = 'color-bomb';
                        candy.dataset.candyType = ''; // No color type
                        candy.innerHTML = colorBombSVG;
                    } else {
                        candy.dataset.special = op.type;
                    }
                    updateOverlays(candy);
                });
            }

            function updateOverlays(candy) {
                // Remove existing overlays
                const existingOverlays = candy.querySelectorAll('.striped-h-overlay, .striped-v-overlay, .wrapped-overlay');
                existingOverlays.forEach(overlay => overlay.remove());

                let overlay;
                switch(candy.dataset.special) {
                    case 'striped-h': overlay = document.createElement('div'); overlay.className = 'striped-h-overlay'; candy.appendChild(overlay); break;
                    case 'striped-v': overlay = document.createElement('div'); overlay.className = 'striped-v-overlay'; candy.appendChild(overlay); break;
                    case 'wrapped': overlay = document.createElement('div'); overlay.className = 'wrapped-overlay'; candy.appendChild(overlay); break;
                }
            }
            
            function animateAndRemoveMatches(matches) {
                 return new Promise(resolve => {
                    matches.forEach(index => board[index].classList.add('match-animation'));
                    setTimeout(() => {
                        matches.forEach(index => {
                            const candy = board[index];
                            if (!findSpecialCandyOpportunities(matches).some(s => s.index === index)) {
                                candy.innerHTML = '';
                                candy.dataset.special = 'none';
                                delete candy.dataset.candyType;
                                updateOverlays(candy);
                            }
                            candy.classList.remove('match-animation');
                        });
                        updateScoreAndMoves();
                        resolve();
                    }, 500);
                });
            }

            function refillBoard() {
                return new Promise(resolve => {
                    for (let col = 0; col < gridSize; col++) {
                        let emptyCount = 0;
                        for (let row = gridSize - 1; row >= 0; row--) {
                            const index = row * gridSize + col;
                            if (!board[index].dataset.candyType && board[index].dataset.special !== 'color-bomb') {
                                emptyCount++;
                            } else if (emptyCount > 0) {
                                const newIndex = (row + emptyCount) * gridSize + col;
                                swapCandies(board[index], board[newIndex]);
                            }
                        }
                        for (let i = 0; i < emptyCount; i++) {
                            const index = i * gridSize + col;
                            const candyType = Math.floor(Math.random() * candies.length);
                            board[index].innerHTML = candies[candyType];
                            board[index].dataset.candyType = candyType;
                            board[index].dataset.special = 'none';
                            updateOverlays(board[index]);
                            board[index].classList.add('new-candy-animation');
                        }
                    }
                    setTimeout(() => {
                        board.forEach(candy => candy.classList.remove('new-candy-animation'));
                        resolve();
                    }, 500);
                });
            }

            function showComboText(count) {
                const comboTexts = ["", "Sweet!", "Delicious!", "Tasty!", "Divine!", "Sugar Rush!"];
                const text = comboTexts[Math.min(count - 1, comboTexts.length -1)];
                const comboEl = document.createElement('div');
                comboEl.className = 'combo-text';
                comboEl.textContent = text;
                gameContainer.appendChild(comboEl);
                setTimeout(() => comboEl.remove(), 1500);
            }

            function updateScoreAndMoves() {
                scoreElement.textContent = score;
                movesElement.textContent = movesLeft;
                hammerCountEl.textContent = hammerCount;
                hammerBoosterBtn.disabled = hammerCount <= 0;
            }
            
            function decrementMoves() {
                movesLeft--;
                updateScoreAndMoves();
                if (movesLeft <= 0) {
                    gameOverSynth.triggerAttackRelease("C2", "8n", Tone.now());
                    setTimeout(endGame, 1000);
                }
            }
            
            function endGame() {
                isBoardLocked = true;
                finalScoreElement.textContent = score;
                gameOverModal.classList.remove('hidden');
            }
            
            hammerBoosterBtn.addEventListener('click', () => {
                if(hammerCount > 0 && !isBoardLocked) {
                    isHammerActive = true;
                    gameBoard.classList.add('hammer-active');
                    hammerCount--;
                    updateScoreAndMoves();
                }
            });

            restartButton.addEventListener('click', initGame);
            initGame();
        });
    </script>
